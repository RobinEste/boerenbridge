name: Deploy to Hetzner

on:
  push:
    branches:
      - main

  # Handmatig kunnen triggeren via GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Create .env.json
        run: |
          echo '{
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}"
          }' > .env.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define-from-file=.env.json

      - name: Deploy to server
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/web/*"
          target: "/tmp/boerenbridge-deploy"
          strip_components: 2
          overwrite: true
          rm: true

      - name: Activate deploy
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo rm -rf /var/www/boerenbridge/*
            cp -r /tmp/boerenbridge-deploy/* /var/www/boerenbridge/
            sudo chown -R www-data:www-data /var/www/boerenbridge
            rm -rf /tmp/boerenbridge-deploy
            echo "Deploy complete at $(date)"
