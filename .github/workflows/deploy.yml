name: Deploy to Hetzner

on:
  push:
    branches:
      - main

  # Handmatig kunnen triggeren via GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Create .env.json
        run: |
          echo '{
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}"
          }' > .env.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define-from-file=.env.json

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          rsync -az --delete -e "ssh $SSH_OPTS" build/web/ deploy@${SERVER_HOST}:/tmp/boerenbridge-deploy/
          ssh $SSH_OPTS deploy@${SERVER_HOST} 'sudo rm -rf /var/www/boerenbridge/* && cp -r /tmp/boerenbridge-deploy/* /var/www/boerenbridge/ && sudo chown -R www-data:www-data /var/www/boerenbridge && rm -rf /tmp/boerenbridge-deploy && echo "Deploy complete at $(date)"'
          rm -f ~/.ssh/deploy_key
