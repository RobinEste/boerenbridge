name: Deploy to Hetzner

on:
  push:
    branches:
      - main

  # Handmatig kunnen triggeren via GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Create config.dart
        run: |
          cat > lib/config.dart << 'EOF'
          class AppConfig {
            static const supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
            static const appName = 'Lekkerkaarten';
            static const minPlayers = 2;
            static const maxPlayers = 6;
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 91.98.65.86
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/web/*"
          target: "/var/www/boerenbridge"
          strip_components: 2

      - name: Set permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.98.65.86
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chown -R www-data:www-data /var/www/boerenbridge
            echo "Deploy complete at $(date)"
