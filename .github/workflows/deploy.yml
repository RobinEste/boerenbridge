name: Deploy to Hetzner

on:
  push:
    branches:
      - main

  # Handmatig kunnen triggeren via GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Create .env.json
        run: |
          echo '{
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}"
          }' > .env.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define-from-file=.env.json

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 91.98.65.86
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/web/*"
          target: "/var/www/boerenbridge"
          strip_components: 2

      - name: Set permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.98.65.86
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chown -R www-data:www-data /var/www/boerenbridge
            echo "Deploy complete at $(date)"
