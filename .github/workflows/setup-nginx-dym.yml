name: Setup Nginx for DYM (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Nginx for DrawYourMap
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.98.65.86
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /etc/nginx/sites-available/drawyourmap << 'NGINX'
            server {
                listen 80;
                server_name drawyourmap.nl www.drawyourmap.nl;
                root /var/www/drawyourmap;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                # Cache static assets
                location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf)$ {
                    expires 7d;
                    add_header Cache-Control "public, immutable";
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/drawyourmap /etc/nginx/sites-enabled/
            nginx -t && systemctl reload nginx
            echo "Nginx configured for drawyourmap.nl!"
